<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>ATHENS Flexibility Course Gallery</title>
    <meta
      name="description"
      content="Photo gallery of the ATHENS Flexibility Course event."
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="gallery.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p class="eyebrow">ATHENS Programme</p>
        <h1>Event Photo Gallery</h1>
        <p class="subtitle">
          Highlights from the ATHENS Flexibility Course in Leuven and Genk.
        </p>

        <nav class="quick-nav" aria-label="Gallery navigation">
          <a href="index.html">Back to Agenda</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section-card">
        <div class="gallery-grid">
          <figure class="gallery-item">
            <a href="assets/img/gallery/photo-1.jpg" target="_blank"
              rel="noopener">
              <img
                src="assets/img/gallery/photo-1.jpg"
                alt="Participants during a lecture session"
                loading="lazy"
              />
            </a>
            <figcaption>Lecture session in Leuven</figcaption>
          </figure>

          <figure class="gallery-item">
            <a href="assets/img/gallery/photo-2.jpg" target="_blank"
              rel="noopener">
              <img
                src="assets/img/gallery/photo-2.jpg"
                alt="Students during the EnergyVille lab visit in Genk"
                loading="lazy"
              />
            </a>
            <figcaption>EnergyVille lab visit in Genk</figcaption>
          </figure>

          <figure class="gallery-item">
            <a href="assets/img/gallery/photo-3.jpg" target="_blank"
              rel="noopener">
              <img
                src="assets/img/gallery/photo-3.jpg"
                alt="Industry talks with invited speakers"
                loading="lazy"
              />
            </a>
            <figcaption>Industry talks</figcaption>
          </figure>

          <figure class="gallery-item">
            <a href="assets/img/gallery/photo-4.jpg" target="_blank"
              rel="noopener">
              <img
                src="assets/img/gallery/photo-4.jpg"
                alt="Group photo of participants and instructors"
                loading="lazy"
              />
            </a>
            <figcaption>Participants and instructors</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        ATHENS Course on Flexibility in Power System Gallery - Md Umar HASHMI<br>
        All rights reserved<br>
        Website Design and Maintenance by @Digiplume
      </div>
    </footer>
  </body>
</html>
